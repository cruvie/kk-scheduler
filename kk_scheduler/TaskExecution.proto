edition = "2023";

package kk_scheduler;

option go_package = "/kk_scheduler";

message TaskCreate {
  message Input {
    string task_name = 1;
    string status = 2;
  }
  message Output {}
}

message TaskUpdateStatus {
  message Input {
    string task_name = 1;
    string status = 2;
  }
  message Output {}
}

message TaskAppendLog {
  message Input {
    string task_name = 1;
    string log = 2;
  }
  message Output {}
}