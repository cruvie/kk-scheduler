edition = "2023";

package kk_scheduler;

option go_package = "/kk_scheduler";
import "kk_scheduler/extend_field.proto";

enum TaskExecutionStatus {
  TASK_EXECUTION_STATUS_UNSPECIFIED = 0;
  TASK_EXECUTION_STATUS_Init = 1;
  TASK_EXECUTION_STATUS_RUNNING = 2;
  TASK_EXECUTION_STATUS_COMPLETED = 3;
  TASK_EXECUTION_STATUS_FAILED = 4;
}

message TaskCreate {
  message Input {
    string id = 1[(field_behavior) = REQUIRED, (field_behavior) = UUID7];
    string jobId = 2[(field_behavior) = REQUIRED, (field_behavior) = UUID7];
  }
  message Output {}
}

message TaskUpdateStatus {
  message Input {
    string id = 1[(field_behavior) = REQUIRED, (field_behavior) = UUID7];
    TaskExecutionStatus status = 2[(field_behavior) = REQUIRED];
  }
  message Output {}
}

message TaskAppendLog {
  message Input {
    string id = 1[(field_behavior) = REQUIRED, (field_behavior) = UUID7];
    string log = 2[(field_behavior) = REQUIRED];
  }
  message Output {}
}