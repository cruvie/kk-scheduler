edition = "2023";

package kk_scheduler;

option go_package = "/kk_scheduler";

import "kk_scheduler/Job.proto";

import "common_pb/extend_field.proto";

message JobGet {
  message Input {
    string serviceName = 1[(field_behavior) = REQUIRED];
    string funcName = 2[(field_behavior) = REQUIRED];
  }

  message Output {
    PBJob Job  = 1;
  }
}